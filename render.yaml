databases:
  - name: telecom-db
    plan: free
    databaseName: telecom_ops
    user: telecom_user

services:
  - type: web
    name: telecom-operations-platform
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: "8080"
      - key: DB_HOST
        fromDatabase:
          name: telecom-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: telecom-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: telecom-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: telecom-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: telecom-db
          property: password
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
