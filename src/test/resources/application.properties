# Database Configuration for Tests (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# JWT Security
application.security.jwt.secret-key=default-jwt-secret-key-that-is-long-enough-for-hs256-tests-to-pass
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# Mailing
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=test@example.com
spring.mail.password=test-password
spring.mail.protocol=smtp
application.mailing.frontend.activation-url=http://localhost:4200/activate-account

# File Uploads
application.file.uploads.photos-output-path=./uploads

# Twilio Dummy Values
twilio.account-sid=AC00000000000000000000000000000000
twilio.auth-token=00000000000000000000000000000000
twilio.phone-number=+15005550006
twilio.status-callback-url=http://localhost:8080/callback
twilio.voice-url=http://localhost:8080/voice
