
server.port=8080
spring.application.name=telecom-platform

# ============================================================================
# ACTIVE DATABASE: H2 (In-Memory)
# ============================================================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ============================================================================
# OPTIONAL DATABASE: MySQL (Commented out)
# ============================================================================
# spring.datasource.url=jdbc:mysql://localhost:3306/microsoft
# spring.datasource.username=root
# spring.datasource.password=password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ============================================================================
# SECURITY & AUTH
# ============================================================================
application.security.jwt.secret-key=${JWT_SECRET_KEY:default-jwt-secret-key-that-is-long-enough-for-hs256-tests-to-pass}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# ============================================================================
# EMAIL SETTINGS
# ============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:default_user}
spring.mail.password=${MAIL_PASSWORD:default_password}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.startls.enable=true
spring.mail.properties.mail.smtp.startls.required=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.required=true

# ============================================================================
# EXTERNAL SERVICES
# ============================================================================
application.mailing.frontend.activation-url=http://localhost:4200/activate-account
application.file.uploads.photos-output-path=./uploads

# Twilio
twilio.account-sid=${TWILIO_ACCOUNT_SID:ACa88f1f19d0d9261f304ef5780bac02f9}
twilio.auth-token=${TWILIO_AUTH_TOKEN:07890ea97ce99fb9119af92b1c0f972e}
twilio.phone-number=${TWILIO_PHONE_NUMBER:+19475461609}

# ============================================================================
# TOOLS & DOCS
# ============================================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
